name: Deploy Godot Web to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure export presets exist
        run: |
          if [ ! -f export_presets.cfg ]; then
            echo "Missing export_presets.cfg"
            echo "Create a Web export preset in Godot first, then commit export_presets.cfg."
            exit 1
          fi

      - name: Install export templates
        run: |
          TEMPLATE_VERSION="4.6.stable"
          TEMPLATE_URL="https://downloads.tuxfamily.org/godotengine/4.6/Godot_v4.6-stable_export_templates.tpz"
          TARGET_DIR="$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"
          TMP_DIR="/tmp/godot-templates"

          rm -rf "$TMP_DIR"
          mkdir -p "$TARGET_DIR" "$TMP_DIR"
          if command -v wget >/dev/null 2>&1; then
            wget -q "$TEMPLATE_URL" -O /tmp/export_templates.tpz
          elif command -v curl >/dev/null 2>&1; then
            curl -fsSL "$TEMPLATE_URL" -o /tmp/export_templates.tpz
          else
            echo "Neither wget nor curl is available in CI container."
            exit 1
          fi
          unzip -oq /tmp/export_templates.tpz -d "$TMP_DIR"

          if [ -d "$TMP_DIR/templates" ]; then
            cp -R "$TMP_DIR/templates/." "$TARGET_DIR/"
          else
            cp -R "$TMP_DIR/." "$TARGET_DIR/"
          fi

          if ls "$TARGET_DIR"/web_nothreads_*.zip >/dev/null 2>&1; then
            echo "Found web_nothreads templates."
          elif ls "$TARGET_DIR"/web_*.zip >/dev/null 2>&1; then
            echo "Found web templates; creating web_nothreads compatibility filenames."
            cp -f "$TARGET_DIR"/web_debug.zip "$TARGET_DIR"/web_nothreads_debug.zip
            cp -f "$TARGET_DIR"/web_release.zip "$TARGET_DIR"/web_nothreads_release.zip
          else
            echo "No web export templates found in $TARGET_DIR"
            ls -la "$TARGET_DIR"
            exit 1
          fi

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web"
          cp -f index.html build/web/index.html
          cp -f ./*.wasm build/web/ 2>/dev/null || true
          cp -f ./*.pck build/web/ 2>/dev/null || true
          cp -f ./*.js build/web/ 2>/dev/null || true
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
