name: Deploy Godot Web to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure export presets exist
        run: |
          if [ ! -f export_presets.cfg ]; then
            echo "Missing export_presets.cfg"
            echo "Create a Web export preset in Godot first, then commit export_presets.cfg."
            exit 1
          fi

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web"
          cp -f index.html build/web/index.html
          cp -f ./*.wasm build/web/ 2>/dev/null || true
          cp -f ./*.pck build/web/ 2>/dev/null || true
          cp -f ./*.js build/web/ 2>/dev/null || true
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
